# ── eSplit Netlify Configuration ──

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── Plausible Analytics Proxy ──
# Proxy le script de tracking et l'API d'événements via le domaine du site
# pour contourner les bloqueurs et pare-feux d'entreprise.

# Proxy du script de tracking
[[redirects]]
  from = "/js/script.js"
  to = "https://plausible.io/js/script.js"
  status = 200

# Proxy de l'endpoint d'événements Plausible (envoi des données de visite)
[[redirects]]
  from = "/api/event"
  to = "https://plausible.io/api/event"
  status = 200

# Proxy de l'API Stats Plausible (pour le panneau admin)
[[redirects]]
  from = "/api/v1/*"
  to = "https://plausible.io/api/v1/:splat"
  status = 200
